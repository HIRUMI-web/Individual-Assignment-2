<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Menu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    body {
        font-family: 'Inter', sans-serif;
        background: #0d0e12;
        min-height: 100vh;
        color: #f3f4f6;
        overflow-x: hidden;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #comet-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none; 
    }

    .container {
        position: relative;
        z-index: 2; 
    }

    .menu-card {
        position: relative;
        border: none; 
        border-radius: 24px;
        background: #000000; 
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        width: 100%;
        max-width: 480px;
        padding: 24px; 
        text-align: center;
        overflow: visible; 
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
    }

    .menu-card::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(45deg, #ff007f, #3b82f6, #a855f7, #38bdf8, #ff007f);
        background-size: 400% 400%;
        border-radius: 26px;
        z-index: -1;
        opacity: 0.5; 
        transition: opacity 0.4s ease, filter 0.4s ease;
        animation: rainbowAnimation 8s ease infinite;
    }

    .menu-card:hover {
        transform: translateY(-4px) scale(1.02); 
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 30px rgba(99, 102, 241, 0.15);
    }

    .menu-card:hover::before {
        opacity: 0.9;
        filter: blur(12px); 
    }

    .card-content-wrapper {
        position: relative;
        background: #000000;
        border-radius: 24px;
        z-index: 1;
    }

    .menu-title {
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #ffffff;
        margin-bottom: 8px;
    }

    .menu-subtitle {
        color: #9ca3af;
        margin-bottom: 28px;
        font-size: 0.95rem;
    }

    .uiverse-btn {
        position: relative;
        background-color: transparent;
        border: none;
        border-radius: 12px;
        width: 100%;
        height: 56px;
        cursor: pointer;
        overflow: hidden;
        font-size: 1rem;
        font-weight: 600;
        display: block;
        margin-bottom: 16px;
        transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
    }

    .uiverse-btn:focus { outline: none; }
    .uiverse-btn:active { transform: scale(0.98); }

    .btn-register-rainbow::before {
        content: "Register New Profile";
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0; left: 0;
        pointer-events: none;
        background: linear-gradient(45deg, #ff007f, #3b82f6, #a855f7, #38bdf8, #ff007f);
        background-size: 300% 300%;
        color: #ffffff;
        z-index: 2;
        transform: translate(0%, 0%);
        animation: rainbowAnimation 6s ease infinite;
        transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
    }

    .btn-register-rainbow::after {
        content: "Register New Profile";
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0; left: 0;
        pointer-events: none;
        background-color: #000000;
        
        background: linear-gradient(45deg, #ff007f, #3b82f6, #a855f7, #38bdf8, #ff007f);
        background-size: 300% 300%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        
        z-index: 1;
        transform: translate(0%, 100%);
        animation: rainbowAnimation 6s ease infinite;
        transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
    }

    .btn-register-rainbow:hover::before { transform: translate(0%, -100%); }
    .btn-register-rainbow:hover::after { transform: translate(0%, 0%); }

    .btn-view-sliding::before {
        content: "View Registered Profile";
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0; left: 0;
        pointer-events: none;
        
        background: #000000;
        border: 2px solid transparent;
        background-image: linear-gradient(#000000, #000000), linear-gradient(45deg, #ff007f, #3b82f6, #a855f7, #38bdf8, #ff007f);
        background-origin: border-box;
        background-clip: padding-box, border-box;
        background-size: 100%, 300% 300%;
        
        color: #ffffff;
        z-index: 2;
        transform: translate(0%, 0%);
        animation: rainbowAnimation 6s ease infinite;
        transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
    }

    .btn-view-sliding::after {
        content: "View Registered Profile";
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0; left: 0;
        pointer-events: none;
        
        background-color: rgba(255, 255, 255, 0.08);
        border: 2px solid transparent;
        background-image: linear-gradient(rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08)), linear-gradient(45deg, #ff007f, #3b82f6, #a855f7, #38bdf8, #ff007f);
        background-origin: border-box;
        background-clip: padding-box, border-box;
        background-size: 100%, 300% 300%;
        
        color: #f3f4f6;
        z-index: 1;
        transform: translate(0%, 100%);
        animation: rainbowAnimation 6s ease infinite;
        transition: all 0.6s cubic-bezier(0.23, 1, 0.320, 1);
    }

    .btn-view-sliding:hover::before { transform: translate(0%, -100%); }
    .btn-view-sliding:hover::after { transform: translate(0%, 0%); }

    @keyframes rainbowAnimation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @media (max-width: 576px) {
        .menu-card {
            padding: 20px 16px;
            margin: 16px;
        }
    }
    </style>
</head>

<body>

    <canvas id="comet-canvas"></canvas>

    <div class="container d-flex justify-content-center">
        <div class="menu-card shadow">
            <div class="card-content-wrapper">
                <h1 class="menu-title"><i class="fas fa-user-circle me-2 text-info"></i> Main Menu</h1>
                <p class="menu-subtitle">Welcome to the Student Profile Management System</p>

                <a href="index.html" class="text-decoration-none">
                    <button type="button" class="uiverse-btn btn-register-rainbow"></button>
                </a>

                <a href="ProfileServlet?action=view" class="text-decoration-none">
                    <button type="button" class="uiverse-btn btn-view-sliding" style="margin-bottom: 0;"></button>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    const canvas = document.getElementById('comet-canvas');
    const ctx = canvas.getContext('2d');

    let comets = [];
    const colors = ['#3b82f6', '#6366f1', '#ec4899', '#a855f7', '#38bdf8'];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Comet {
        constructor() {
            this.reset();
        }

        reset() {
            if (Math.random() > 0.5) {
                this.x = Math.random() * canvas.width;
                this.y = -20;
            } else {
                this.x = -20;
                this.y = Math.random() * (canvas.height * 0.6);
            }
            
            this.length = Math.random() * 80 + 40; 
            this.speed = Math.random() * 4 + 3;    
            this.thickness = Math.random() * 2 + 1;
            this.color = colors[Math.floor(Math.random() * colors.length)];
            
            this.vx = this.speed * 1.2; 
            this.vy = this.speed;       
            this.alpha = Math.random() * 0.4 + 0.3; 
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            if (this.x > canvas.width + this.length || this.y > canvas.height + this.length) {
                this.reset();
            }
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;

            let gradient = ctx.createLinearGradient(
                this.x, this.y, 
                this.x - this.length, this.y - this.length
            );
            gradient.addColorStop(0, this.color);
            gradient.addColorStop(1, 'transparent');

            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - this.length, this.y - this.length);
            ctx.lineWidth = this.thickness;
            ctx.strokeStyle = gradient;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            ctx.restore();
        }
    }

    function init() {
        comets = [];
        for (let i = 0; i < 45; i++) {
            comets.push(new Comet());
            comets[i].x = Math.random() * canvas.width;
            comets[i].y = Math.random() * canvas.height;
        }
    }

    function animate() {
        ctx.fillStyle = 'rgba(13, 14, 18, 0.3)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        comets.forEach(comet => {
            comet.update();
            comet.draw();
        });

        requestAnimationFrame(animate);
    }

    init();
    animate();
    </script>
</body>
</html>
